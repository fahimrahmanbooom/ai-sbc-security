app = "app-cool-waterfall-4592"
primary_region = "ams"

[build]
  dockerfile = "federated-server/Dockerfile"

[env]
  FL_DATA_DIR = "/data"

[mounts]
  source = "fl_data"
  destination = "/data"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
