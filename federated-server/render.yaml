services:
  - type: web
    name: ai-sbc-federated-server
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FL_DATA_DIR
        value: /tmp/fl-server
    healthCheckPath: /health
